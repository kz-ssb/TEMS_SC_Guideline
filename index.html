<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サービスセンター職場運営ガイドライン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f2f4f7;
  --surface: #ffffff;
  --border: #dde1e8;
  --text: #1c2233;
  --muted: #6b7280;
  --accent: #1e3a6e;
  --accent-l: #e8edf8;
  --accent-m: #2c559a;
  --mgr: #6b3a1f;
  --mgr-l: #fdf3ec;
  --mgr-border: #e8a87c;
  --tems: #1e3a6e;
  --jr: #c0392b;
  --nav-w: 220px;
  --side-w: 210px;
  --top-h: 54px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.8; height: 100vh; overflow: hidden; }

/* TOPBAR */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--top-h);
  background: var(--accent); color: #fff;
  display: flex; align-items: center; padding: 0 18px; gap: 14px; z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.logo { font-family: 'Noto Serif JP',serif; font-size: 15px; font-weight: 600; flex: 1; letter-spacing: .02em; }
.logo small { font-size: 10px; font-weight: 400; opacity: .6; margin-left: 8px; font-family: 'Noto Sans JP',sans-serif; }
#search-inp {
  width: 220px; padding: 6px 12px; border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,.3); background: rgba(255,255,255,.15);
  color: #fff; font-size: 12px; font-family: inherit; outline: none; transition: all .2s;
}
#search-inp::placeholder { color: rgba(255,255,255,.55); }
#search-inp:focus { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.6); width: 300px; }
.corp-badge { font-size: 10px; opacity: .75; white-space: nowrap; }

/* LAYOUT */
#layout {
  display: grid;
  grid-template-columns: var(--nav-w) 1fr var(--side-w);
  height: calc(100vh - var(--top-h));
  margin-top: var(--top-h);
  overflow: hidden;
}

/* LEFT NAV */
#nav { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 14px 0; }
.nav-filter { padding: 0 10px 10px; }
.nav-filter input { width: 100%; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; font-family: inherit; background: var(--bg); outline: none; }
.nav-filter input:focus { border-color: var(--accent); }
.nav-chap-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: 10px 14px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 7px; padding: 7px 14px;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: background .12s;
  border-left: 3px solid transparent; color: var(--text);
}
.nav-item:hover { background: var(--bg); }
.nav-item.active { border-left-color: var(--accent); color: var(--accent); background: var(--accent-l); }
.nav-ico { width: 20px; height: 20px; border-radius: 4px; background: var(--accent-l); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.nav-sub { padding: 0 0 6px 41px; }
.nav-sub-item { display: block; padding: 3px 14px; font-size: 11px; color: var(--muted); cursor: pointer; border-radius: 4px; transition: all .1s; }
.nav-sub-item:hover { color: var(--accent); background: var(--accent-l); }
.nav-sub-item.active { color: var(--accent); font-weight: 500; }

/* MAIN */
#main { overflow-y: auto; background: var(--bg); }
.content-inner { max-width: 720px; margin: 0 auto; padding: 28px 28px 80px; }

/* Article styles */
.ch-title {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-m) 100%);
  color: #fff; padding: 28px 32px; border-radius: 10px; margin-bottom: 28px;
}
.ch-title .ch-num { font-size: 11px; opacity: .8; letter-spacing: .1em; margin-bottom: 4px; }
.ch-title h1 { font-family: 'Noto Serif JP',serif; font-size: 22px; font-weight: 600; line-height: 1.4; }

.sec-title {
  display: flex; align-items: center; gap: 10px; margin: 28px 0 14px;
  padding-bottom: 8px; border-bottom: 2px solid var(--accent);
}
.sec-title h2 { font-size: 17px; font-weight: 700; color: var(--accent); }
.sec-num-badge { background: var(--accent); color: #fff; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }

.subsec { margin: 16px 0; }
.subsec-title {
  background: var(--accent-l); border-left: 4px solid var(--accent);
  padding: 8px 14px; font-size: 13px; font-weight: 700; color: var(--accent);
  margin-bottom: 10px; border-radius: 0 6px 6px 0;
}

/* For Manager badge */
.mgr-badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  background: var(--mgr-l); border: 1px solid var(--mgr-border);
  border-radius: 12px; font-size: 10px; font-weight: 700; color: var(--mgr);
  margin-bottom: 10px;
}

.mgr-hidden { display: none !important; }
.mgr-block {
  background: var(--mgr-l); border: 1px solid var(--mgr-border);
  border-left: 4px solid var(--mgr); border-radius: 0 8px 8px 0;
  padding: 12px 16px; margin: 12px 0;
}
.mgr-block .mb-label { font-size: 10px; font-weight: 700; color: var(--mgr); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
.mgr-block p, .mgr-block li { color: #4a2010; font-size: 13px; }

.summary-box {
  background: var(--accent-l); border: 1px solid #b0c4e8;
  border-left: 4px solid var(--accent); border-radius: 0 8px 8px 0;
  padding: 14px 18px; margin: 14px 0; font-size: 13px; line-height: 1.8;
}

p { margin-bottom: 10px; font-size: 13px; line-height: 1.85; }
ul { margin: 8px 0 10px 20px; }
li { margin-bottom: 6px; font-size: 13px; line-height: 1.75; }
.ul-plain { list-style: none; margin-left: 0; }
.ul-plain li { padding-left: 14px; position: relative; }
.ul-plain li::before { content: '・'; position: absolute; left: 0; color: var(--accent); }

/* Emphasis styles */
.em-underline { text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 3px; }
.em-bold { font-weight: 700; }
.em-both { font-weight: 700; text-decoration: underline; text-decoration-color: #1c2233; text-underline-offset: 3px; }

/* Two-column layout for figures */
.fig-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; align-items: start; }
.fig-caption { text-align: center; font-size: 11px; color: var(--muted); margin-top: 8px; }

/* Chart container */
.chart-wrap { position: relative; height: 240px; }

/* Collaboration figure */
.collab-fig {
  background: #f8f9ff; border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; text-align: center;
}
.collab-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.collab-sub { font-size: 20px; font-weight: 700; color: #c0392b; margin-bottom: 12px; }
.collab-icons { display: flex; justify-content: center; align-items: center; gap: 16px; }
.collab-person { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.collab-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.collab-avatar.tems { background: #dbeafe; }
.collab-avatar.jr { background: #fde8e8; }
.collab-label { font-size: 10px; font-weight: 500; color: var(--muted); }
.collab-arrow { font-size: 24px; color: var(--accent); }
.collab-center { background: var(--accent); color: #fff; padding: 6px 12px; border-radius: 16px; font-size: 11px; font-weight: 700; }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
.data-table th { background: var(--accent); color: #fff; padding: 7px 10px; text-align: left; font-weight: 500; }
.data-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
.data-table tr:nth-child(even) td { background: var(--accent-l); }
.data-table .sym { text-align: center; font-size: 14px; }
.sym-double { color: #c0392b; font-weight: 700; }
.sym-circle { color: var(--accent-m); font-weight: 700; }
.sym-tri { color: #e67e22; }

/* Feedback widget per block */
.cb { position: relative; padding: 10px 12px; border-radius: 7px; transition: background .15s; border-left: 3px solid transparent; margin-bottom: 2px; }
.cb:hover { background: rgba(30,58,110,.04); border-left-color: rgba(30,58,110,.18); }
.cb:hover .ba { opacity: 1; pointer-events: auto; }
.ba { position: absolute; right: 8px; top: 7px; display: flex; align-items: center; gap: 5px; opacity: 0; pointer-events: none; transition: opacity .15s; }
.ba-btn { display: flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); font-size: 11px; font-family: inherit; cursor: pointer; color: var(--muted); transition: all .12s; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.ba-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }
.ba-btn.liked { border-color: #e74c3c; color: #e74c3c; background: #fdf0f0; }

/* Comment thread */
.ct { margin: 2px 0 6px 12px; border-left: 2px solid var(--border); padding: 8px 12px; border-radius: 0 6px 6px 0; background: var(--bg); display: none; }
.ct.open { display: block; }
.ct-row { display: flex; gap: 7px; align-items: flex-start; }
.ct-av { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.ct-inp { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-family: inherit; resize: none; min-height: 34px; background: var(--surface); outline: none; transition: border-color .15s, min-height .15s; }
.ct-inp:focus { border-color: var(--accent); min-height: 60px; }
.ct-send { padding: 5px 12px; background: var(--accent); color: #fff; border: none; border-radius: 5px; font-size: 11px; font-family: inherit; cursor: pointer; font-weight: 500; margin-top: 1px; }
.ct-list { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.ct-item { background: var(--surface); border-radius: 6px; padding: 7px 10px; border: 1px solid var(--border); }
.ct-meta { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
.ct-text { font-size: 12px; line-height: 1.6; }

/* RIGHT SIDE */
#side { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
.side-hdr { padding: 14px 12px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 10; }
.side-hdr h3 { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.side-hdr p { font-size: 10px; color: var(--muted); }
.side-tabs { display: flex; border-bottom: 1px solid var(--border); }
.s-tab { flex: 1; padding: 7px 0; text-align: center; font-size: 11px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .12s; }
.s-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.side-body { flex: 1; padding: 10px; overflow-y: auto; }
.op-item { padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 6px; background: var(--bg); cursor: pointer; transition: border-color .12s; }
.op-item:hover { border-color: var(--accent); }
.op-sec { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
.op-text { font-size: 11px; line-height: 1.5; }
.op-meta { font-size: 9px; color: var(--muted); margin-top: 3px; display: flex; justify-content: space-between; }
.lk-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 5px; background: var(--bg); cursor: pointer; }
.lk-item:hover { border-color: #e74c3c; }
.lk-num { font-size: 18px; font-weight: 700; color: #e74c3c; min-width: 28px; text-align: center; }
.lk-info { flex: 1; min-width: 0; }
.lk-sec { font-size: 9px; color: var(--muted); }
.lk-title { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lk-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 3px; }
.lk-bar-fill { height: 3px; background: #e74c3c; border-radius: 2px; }
.empty { text-align: center; padding: 24px 10px; color: var(--muted); font-size: 11px; line-height: 1.7; }

/* Search panel */
#sp { display: none; position: fixed; top: var(--top-h); left: var(--nav-w); right: var(--side-w); background: rgba(0,0,0,.35); z-index: 150; padding: 16px; }
#sp.show { display: block; }
#sr { background: var(--surface); border-radius: 10px; max-width: 580px; margin: 0 auto; padding: 16px; max-height: calc(100vh - 90px); overflow-y: auto; box-shadow: 0 4px 24px rgba(0,0,0,.15); }
.sr-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.sr-hdr h3 { font-size: 12px; font-weight: 700; }
.sr-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); }
.sr-item { padding: 9px; border-radius: 6px; cursor: pointer; transition: background .1s; border: 1px solid transparent; margin-bottom: 4px; }
.sr-item:hover { background: var(--bg); border-color: var(--border); }
.si-ch { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
.si-title { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
.si-snip { font-size: 11px; color: var(--muted); }
mark { background: #fff176; padding: 0 2px; border-radius: 2px; }

#toast { position: fixed; bottom: 20px; right: 20px; padding: 8px 16px; background: #1c2233; color: #fff; border-radius: 6px; font-size: 12px; opacity: 0; transform: translateY(6px); transition: all .2s; z-index: 1000; pointer-events: none; }
#toast.show { opacity: 1; transform: translateY(0); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>


<!-- LOGIN -->
<div id="login-screen" style="position:fixed;inset:0;background:#1e3a6e;display:flex;align-items:center;justify-content:center;z-index:500;">
  <div style="background:#fff;border-radius:14px;padding:36px 44px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center;">
    <div style="font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600;margin-bottom:4px;color:#1e3a6e;">サービスセンター<br>職場運営ガイドライン</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:6px;">東日本電気エンジニアリング株式会社</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:22px;">アカウントを選択してください（デモ）</div>
    <button onclick="login('general')" style="width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid #dde1e8;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;text-align:left;display:flex;align-items:center;gap:9px;margin-bottom:9px;transition:all .15s;" onmouseover="this.style.borderColor='#1e3a6e';this.style.background='#e8edf8'" onmouseout="this.style.borderColor='#dde1e8';this.style.background='#fff'">
      <span style="width:9px;height:9px;border-radius:50%;background:#2a7a4a;flex-shrink:0;"></span>
      <div><div>一般職アカウント</div><div style="font-size:10px;color:#6b7280;font-weight:400;">一般職向けコンテンツのみ閲覧</div></div>
    </button>
    <button onclick="login('manager')" style="width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid #dde1e8;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;text-align:left;display:flex;align-items:center;gap:9px;margin-bottom:0;transition:all .15s;" onmouseover="this.style.borderColor='#6b3a1f';this.style.background='#fdf3ec'" onmouseout="this.style.borderColor='#dde1e8';this.style.background='#fff'">
      <span style="width:9px;height:9px;border-radius:50%;background:#6b3a1f;flex-shrink:0;"></span>
      <div><div>管理職アカウント</div><div style="font-size:10px;color:#6b7280;font-weight:400;">全コンテンツ＋for Manager表示</div></div>
    </button>
    <div style="font-size:10px;color:#6b7280;margin-top:14px;">※ これはデモ画面です</div>
  </div>
</div>

<div id="topbar">
  <div class="logo">サービスセンター職場運営ガイドライン <small>第１版　2026年4月1日制定</small></div>
  <input type="text" id="search-inp" placeholder="🔍 キーワード検索...">
  <div class="corp-badge">東日本電気エンジニアリング株式会社</div>
  <div id="user-badge" style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:16px;border:1px solid rgba(255,255,255,.3);font-size:11px;cursor:pointer;white-space:nowrap;" onclick="logout()">
    <span id="bdot" style="width:7px;height:7px;border-radius:50%;background:#7effc4;"></span>
    <span id="uname"></span>
    <span style="opacity:.6;font-size:9px;">▾</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px;font-size:10px;opacity:.8;white-space:nowrap;">
    切替▸
    <select onchange="switchRole(this.value)" id="role-select" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:4px;padding:2px 4px;font-size:10px;font-family:inherit;cursor:pointer;">
      <option value="general">一般職</option>
      <option value="manager">管理職</option>
    </select>
  </div>
</div>

<div id="layout">
  <!-- 左：目次 -->
  <div id="nav">
    <div class="nav-filter"><input type="text" placeholder="目次を絞り込む..." oninput="filterNav(this.value)"></div>
    <div id="nav-list"></div>
  </div>

  <!-- 中央：本文 -->
  <div id="main">
    <div class="content-inner" id="content-inner"></div>
  </div>

  <!-- 右：意見 -->
  <div id="side">
    <div class="side-hdr">
      <h3>💬 意見・評価</h3>
      <p>各段落へのフィードバック</p>
    </div>
    <div class="side-tabs">
      <div class="s-tab active" id="tab-op" onclick="switchTab('op')">意見一覧</div>
      <div class="s-tab" id="tab-lk" onclick="switchTab('lk')">いいね順</div>
    </div>
    <div class="side-body" id="side-body"></div>
  </div>
</div>

<div id="sp" onclick="if(event.target===this)hideSP()">
  <div id="sr">
    <div class="sr-hdr"><h3 id="sr-title">検索結果</h3><button class="sr-close" onclick="hideSP()">✕</button></div>
    <div id="sr-list"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const CHAPTERS=[{id:'ch1',num:'第１章',title:'本ガイドラインの目的と使い方',sections:[{id:'s1-1',title:'１．本ガイドラインの制定目的',blocks:[{id:'b1-1-1',label:'(1)一般的な職場運営のあり方',text:'一般的に、職場の運営については、「会社から示される大きな方針」「職場の運営に関する社内常識（体制や業務運営に関するルール等、規程・マニュアル等となっていなくても社員が共通して認知している考え方）」をベースとしながら、これに、「仕事の環境や状況・職場の要員構成等」に応じて管理職社員等が、徹底的に考えて、当該の職場にとってベストの方法を見出して運営していくものである。'},{id:'b1-1-2',label:'(2)当社の現状（2025年度時点）',text:'当社の現業職場であるサービスセンター（以下、SC）においては、当社の経営条件的側面から以下の特徴がある。',isList:true,items:['①多様な設備種類を、多様な作業ルールの中で扱う。JR東日本在来線、同新幹線、第三セクター等、いくつかの鉄道事業者。多様な設備種類や多様な作業ルールをマスターする必要がある。','②受注する仕事の種類が多い。検修、工事（単価契約・一般工事他）、業務委託（伐採・除草、除雪、警備）、移管業務等、仕事の幅が広い。','③JR東出身の社員が一定割合存在するという要員構成。「TEMS採用社員（以下、TEMS社員）」だけでなく、「JR東日本からの出向者（エルダー出向、一般出向、管理職）」や「JR東日本OB社員」が一定割合で存在している。']},{id:'b1-1-3',text:'このような特徴があるため、SCの運営は基本的に難しいものとなるが、これら特徴を真正面から捉えた上で「どう運営すべきか」を会社全体としてこれまでしっかりと整理したことがない。結果、上記(1)項における「職場運営に関する社内常識」が不十分なままで運営をしているのが過去からの実態となっている。'},{id:'b1-1-4',text:'これまでJR出身者がJR時代の経験をもとになんとか職場運営を担ってきたが、今は、その人数も減り、TEMS社員が、「職場運営に関する社内常識」がないまま「なんとなく」この運営を引き継いでいる。運営の苦労が非常に多い状況となっている。'},{id:'b1-1-5',label:'(3)ガイドラインの制定の必要性',text:'こういった「職場運営に関する社内常識」を一度明文化し、そこで育った社員はその常識を自然と身に着けているという「良い循環」を作り出すため、今回「サービスセンター職場運営ガイドライン」を制定する必要がある。'},{id:'b1-1-6',label:'(5)ガイドラインの制定目的（まとめ）',isSummary:true,text:'本ガイドラインは、SC運営における要員配置・チーム構成・業務分担・社員育成の考え方を整理した上で「職場運営に関するあるべき姿」を明文化し、各職場における運営の質の均一化と継続的なパフォーマンス向上を目的として制定する。'}]},{id:'s1-2',title:'２．本ガイドラインの使い方等',blocks:[{id:'b1-2-1',label:'(1)活用イメージ',isList:true,items:['【職場運営の一助】新任SC管理職社員のひとつのより所とする他、一定の経験があるSC管理職社員であっても困った時にヒントを得るといった使い方で、「SC管理職社員の職場運営の一助」となるような活用を望む。','【教育・研修等での活用】課長代理・副課長・管理職等の役職ごとに何をやるべきかの指導や、役職ごとの新任時研修等で活用する。','【社内常識の構築】こういった活用により「なんとなくこういう感じで運営するのか」という社内常識を社員が共通的に持つようにする。']},{id:'b1-2-2',label:'(2)必ず本ガイドラインに従った運営とする必要があるか',text:'前述の第1項(1)で示すとおり、職場の運営は最終的に管理職等職場を預かる社員がその運営を決定すべきであるので、十分に考えた結果であるならば、本ガイドラインに必ず従う必要はない。'},{id:'b1-2-3',text:'しかし、「なんとなく」「前からそうなので」という程度であれば、本ガイドラインに沿った運営を行う方がより適切な職場運営ができるはずである。'},{id:'b1-2-4',label:'(3)本ガイドライン運用における注意事項〜あくまでも考え方の土台〜',isSummary:true,text:'本ガイドラインは、「考えることを省く」ためのものではない。適切に課題を捉えて、その解決を考え続けるための"土台"である。'}]}]},{id:'ch4',num:'第４章',title:'多様な社員区分による「協働」の大切さ',sections:[{id:'s4-1',title:'１．SC運営の前提〜相互理解の必要性〜',blocks:[{id:'b4-1-1',label:'(1)当社の運営の前提〜社員構成の特徴〜',hasPieChart:true,text:'当社は、社員区分割合（2026年4月時点）として、TEMS社員が1,225人（68%）、JRエルダー・OBが323人（18%）、出向ACが97人（6%）、JR一般出向が41人（2%）、JR管理が30人（2%）、その他が78人（4%）となっている。特に、JR東日本で多くの鉄道フィールドでの業務経験を持つ社員（JRエルダー・OB社員）が、TEMS社員に次いで、一定の割合（2026年4月時点で約2割）を占めているというのが大きな特徴となっている。'},{id:'b4-1-2',text:'TEMS社員は当社で働いてきた「当社ならではの仕事の進め方のノウハウ」を持っている一方、JRエルダー・OB社員は、長年の鉄道フィールドでの業務経験で培った技術や各種安全ルール等に関する知識やノウハウを有している。'},{id:'b4-1-3',text:'こういった異なる社員区分が持つ背景を相互に理解し、相互の強みを生かして弱みを補完しあい、世代を超えて支え合う「協働」で、当社は、組織として最大の力を発揮することができる。この当社ならではの「協働」を文化として醸成し続けることは、SCを適切に運営するために大事なポイントである。'},{id:'b4-1-4',label:'(2)相互理解して欲しいこと',isMgr:true,text:'TEMS社員は、SCの運営の中核を担っている存在であり、多くの苦労があっても使命感を持って取り組み続けている。一方、JRエルダー・OB社員には、現役時代と比較して体力・賃金面で厳しいことや、年齢が高くなってからTEMSという新天地で働く苦労といった事情もある。JRエルダー・OBはTEMS社員の頑張りを、TEMS社員はJROB・エルダーが置かれた状況を、相互に理解した上で、相互に配慮しあいながら協働していくことが期待されている。'},{id:'b4-1-5',label:'(3)所長・副所長が導くべき「協働」の考え方',isMgr:true,hasWorkCharts:true,text:'「協働」の文化が乏しい職場では、JRエルダー・OBからのサポートが不十分となりTEMS社員に負担が偏る。TEMS社員に対してはJRエルダー・OB社員の事情を、JRエルダー・OB社員に対してはTEMS社員の苦労を、適宜・適切に説明して、お互いを思いやって仕事を進める「協働」の状況が職場内にできるように、職場全体を導いていく。これは、当社の管理職社員が意識すべきポイントの一つである。'}]},{id:'s4-2',title:'２．TEMS社員に期待される役割',blocks:[{id:'b4-2-1',label:'(1)TEMS社員の働きがSC運営の中核',isSummary:true,text:'SC安定運営の屋台骨を背負っているのはTEMS社員であり、また、それはTEMS社員であるべきである。TEMS社員は、この点（SC運営の屋台骨を背負うこと）について自信と誇りを持って日々の業務に取り組むことが期待されている。'},{id:'b4-2-2',text:'TEMS社員は、社員数的に最も多いし、また、当社の社員として入社して以降、当社のやり方に従って仕事をやってきていることから「TEMSの仕事のやり方」を腹の底から知っている。このため、SCの安定運営においても中核的な役割を担うことが期待されている。'}]},{id:'s4-3',title:'３．JRエルダー・JROB社員に期待される役割',blocks:[{id:'b4-3-1',label:'ア．検修責任者や工事指揮者としての従事',text:'JR在籍時の経験を前提として検修責任者・工事指揮者等のライセンスを付与されて当社に来ている。これはJR⇒TEMSと立場が変わっても、「鉄道の安全安定輸送に尽力することが期待されている人財」であるためである。検修責任者・工事指揮者といった責任者として、適切に作業段取り（事前準備）、当日当夜の作業指揮・管理を行い、鉄道の安全安定輸送を実現することが期待されている。'},{id:'b4-3-2',label:'イ．「元JR社員」という優位性を活かした仕事の進め方',text:'JR在籍時の人脈を駆使する、鉄道事業者側の考えを先取りする等、「TEMS社員では難しい仕事のやり方」がある。こういった仕事のやり方は、安全・品質確保・業務効率化に寄与することが多く、この貢献の形は、当社とJRの双方の立場や状況を知るJRエルダー・OBだからこそできるものである。'}]},{id:'s4-4',title:'４．管理職社員に求められるJRエルダー・OB社員への向き合い方',isMgr:true,blocks:[{id:'b4-4-1',label:'(1)JRエルダー・OB社員にやってもらうべき基本的な業務内容',isMgr:true,text:'SCにおいて一般職社員にて行う「施工管理業務」は大別して2種類ある。①各作業日の業務（現場・所内とも）、②複数の作業日や複数の関係者に跨って行う所内共通業務。このうち、JRエルダー・OB社員に基本として求められる業務は、①のうちの「検修責任者・工事指揮者」としての業務で、これには、当日・当夜に責任者として従事するだけでなく、その前の段取り（事前準備）や作業後の整理も含まれる。',hasTable:true},{id:'b4-4-2',label:'(3)貢献度が大きい意欲的なJRエルダー・OB社員への対応',isMgr:true,text:'JRエルダー・OB社員のモチベーションの維持・向上には、「組織や他者のためになっている」という実感が必要であるため、貢献している社員に対して、面談や会議の場で具体的に感謝を伝えることが大事。管理職社員は常にこれを意識すべきである。'}]}]}];

let activeSecId='s1-1',likes={},comments=[],cmtOpen={},activeTab='op',chartRendered={},currentRole='general';

function login(r){
  currentRole=r;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('uname').textContent=r==='manager'?'田中 部長':'佐藤 太郎';
  document.getElementById('bdot').style.background=r==='manager'?'#d4aaff':'#7effc4';
  document.getElementById('role-select').value=r;
  renderNav(); showSection('s1-1'); renderSide();
}
function logout(){ document.getElementById('login-screen').style.display='flex'; }
function switchRole(r){
  currentRole=r;
  document.getElementById('uname').textContent=r==='manager'?'田中 部長':'佐藤 太郎';
  document.getElementById('bdot').style.background=r==='manager'?'#d4aaff':'#7effc4';
  chartRendered={};
  renderNav(); showSection(activeSecId); renderSide();
}

function renderNav(f){
  f=f||'';
  let html='';
  CHAPTERS.forEach(ch=>{
    html+=`<div class="nav-chap-label">${ch.num}　${ch.title}</div>`;
    ch.sections.filter(s=>!f||s.title.includes(f)).forEach(s=>{
      if(s.isMgr && currentRole!=='manager') return;
      const active=s.id===activeSecId?'active':'';
      const num=ch.num.replace('第','').replace('章','');
      html+=`<div class="nav-item ${active}" data-sid="${s.id}" onclick="showSection(this.dataset.sid)">`;
      html+=`<span class="nav-ico">${num}</span><span>${s.title}</span></div>`;
    });
  });
  document.getElementById('nav-list').innerHTML=html;
}
function filterNav(v){ renderNav(v); }

function findChSec(secId){
  let res={ch:null,sec:null};
  CHAPTERS.forEach(ch=>ch.sections.forEach(s=>{ if(s.id===secId){res.ch=ch;res.sec=s;} }));
  return res;
}

function showSection(secId){
  activeSecId=secId; renderNav();
  const {ch,sec}=findChSec(secId);
  if(!sec) return;
  if(sec.isMgr && currentRole!=='manager'){
    document.getElementById('content-inner').innerHTML='<div style="padding:60px;text-align:center;color:#6b7280;"><div style="font-size:40px;margin-bottom:16px;">🔒</div><div style="font-size:15px;font-weight:500;">このコンテンツは管理職アカウントでのみ閲覧できます。</div></div>';
    return;
  }
  let html=`<div class="ch-title"><div class="ch-num">${ch.num}</div><h1>${ch.title}</h1></div>`;
  html+=`<div class="sec-title"><span class="sec-num-badge">${sec.id.replace('s','').split('-')[0]}</span><h2>${sec.title}</h2></div>`;
  if(sec.isMgr) html+=`<div class="mgr-badge">👔 for Manager</div>`;

  const visBlocks=sec.blocks.filter(b=>!(b.isMgr && currentRole!=='manager'));
  visBlocks.forEach(b=>{
    let inner='';
    if(b.label) inner+=`<div class="subsec-title">${b.label}</div>`;
    if(b.isMgr) inner+=`<div class="mgr-badge">👔 for Manager</div>`;

    if(b.hasPieChart){
      inner+=`<div class="fig-row"><div><p>${b.text}</p></div>
      <div><div class="chart-wrap"><canvas id="pie-${b.id}"></canvas></div>
      <div class="fig-caption">［図1］社員構成（2026.4時点）</div></div></div>
      <div class="collab-fig" style="margin-top:16px">
        <div class="collab-title">TEMS特有の「協働」文化</div>
        <div class="collab-sub">最大成果</div>
        <div class="collab-icons">
          <div class="collab-person"><div class="collab-avatar tems">👷</div><div class="collab-label">TEMS社員</div></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div class="collab-center">協働</div><div style="font-size:18px">🤝</div></div>
          <div class="collab-person"><div class="collab-avatar jr">👴</div><div class="collab-label">JRエルダー・OB社員</div></div>
        </div>
        <div class="fig-caption" style="margin-top:8px">［図2］「協働」のイメージ</div>
      </div>`;
    } else if(b.hasWorkCharts){
      inner+=`<div class="mgr-block"><div class="mb-label">管理職向け</div><p>${b.text}</p></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;">
        <div style="background:#f8f9ff;border:1px solid #dde1e8;border-radius:8px;padding:12px;">
          <div style="font-size:11px;font-weight:700;color:#1e3a6e;margin-bottom:8px;">■「協働」の管理ポイント</div>
          <p style="font-size:11px;line-height:1.6;margin-bottom:6px;">以下の通り、<strong>「バランスが取れた負荷管理」</strong>を行う。</p>
          <ol style="font-size:11px;line-height:1.7;margin-left:16px;">
            <li>TEMS社員の負荷が限界を超える前に、JRエルダー・OBのサポートが十分に行われるように。<br><strong>「ほどほどに負荷が追従する」状態を目指す！</strong></li>
            <li>JRエルダー・OB社員が自らTEMS社員並みにやってくれる場合は大いに甘えるべきであるが、これを一律で求めてない。</li>
          </ol>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#1e3a6e;margin-bottom:4px;">○"ほどほど"な感じの良い状態</div>
          <div style="font-size:10px;color:#6b7280;margin-bottom:4px;">TEMS社員の忙しさにJRエルダー・OB社員も追従する形で運営できている。</div>
          <div style="height:130px;"><canvas id="chart-good"></canvas></div>
        </div>
      </div>
      <div style="background:#fff8f0;border:1px solid #e8a87c;border-left:4px solid #6b3a1f;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:12px;">
        <div style="font-size:10px;font-weight:700;color:#6b3a1f;margin-bottom:8px;">負荷管理状況の例（月々超勤）</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <div style="font-size:10px;font-weight:700;color:#c0392b;margin-bottom:3px;">○好ましくない状態</div>
            <div style="font-size:10px;color:#6b7280;margin-bottom:4px;">TEMS社員が忙しい月でもJRエルダー・OBの状況はあまり変わらない。</div>
            <div style="height:110px;"><canvas id="chart-bad"></canvas></div>
          </div>
          <div>
            <div style="font-size:10px;font-weight:700;color:#27ae60;margin-bottom:3px;">○非常に良いが・・・</div>
            <div style="font-size:10px;color:#6b7280;margin-bottom:4px;">忙しさが平準化されていて理想的ではあるが、一律にこれを求めない。</div>
            <div style="height:110px;"><canvas id="chart-best"></canvas></div>
          </div>
        </div>
      </div>`;
    } else if(b.isSummary){
      inner+=`<div class="summary-box">${b.text}</div>`;
    } else if(b.isMgr && b.text){
      inner+=`<div class="mgr-block"><div class="mb-label">管理職向け</div><p>${b.text}</p></div>`;
    } else if(b.isList){
      if(b.text) inner+=`<p>${b.text}</p>`;
      inner+=`<ul class="ul-plain">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    } else if(b.text){
      inner+=`<p>${b.text}</p>`;
    }

    if(b.hasTable){
      inner+=`<table class="data-table" style="margin-top:12px">
        <tr><th>実施時期</th><th>業務内容</th><th>分担</th></tr>
        <tr><td rowspan="4">作業前（事前準備）</td><td>施工安全計画書作成・施工安全計画会議付議</td><td class="sym sym-tri">△</td></tr>
        <tr><td>作業方法検討・協力会社調整</td><td class="sym sym-circle">○</td></tr>
        <tr><td>当日工程検討・調整</td><td class="sym sym-circle">○</td></tr>
        <tr><td>保安打合票等作成・上位者チェック対応・保安打合せ</td><td class="sym sym-circle">○</td></tr>
        <tr><td>当日・当夜</td><td>検修責任者・工事指揮者従事</td><td class="sym sym-double">◎</td></tr>
        <tr><td>作業後（整理）</td><td>作業結果データ入力・不具合報告書等レポート作成</td><td class="sym sym-circle">○</td></tr>
      </table>
      <div style="font-size:11px;color:#6b7280;margin-top:6px;">【凡例】◎：基本として求められる業務　○：基本として求められる業務（任せることもある）　△：意欲的な社員にやってもらえればよい業務</div>`;
    }

    const likeCount=getLikeCount(b.id);
    const clist=comments.filter(c=>c.blockId===b.id);
    const liked=likes[b.id]?'liked':'';
    const isOpen=cmtOpen[b.id]?'open':'';
    const cmtLabel=clist.length?`${clist.length}件`:'意見';
    const av=currentRole==='manager'?'田':'佐';

    html+=`<div class="cb" id="cb-${b.id}">${inner}
      <div class="ba">
        <button class="ba-btn ${liked}" data-bid="${b.id}" onclick="toggleLike(this.dataset.bid)">♥ <span id="lc-${b.id}">${likeCount}</span></button>
        <button class="ba-btn" data-bid="${b.id}" onclick="toggleCmt(this.dataset.bid)">💬 <span id="cc-${b.id}">${cmtLabel}</span></button>
      </div>
    </div>
    <div class="ct ${isOpen}" id="ct-${b.id}">
      <div class="ct-row">
        <div class="ct-av">${av}</div>
        <textarea class="ct-inp" id="ci-${b.id}" placeholder="この内容へのご意見・質問..." rows="1" onfocus="this.style.minHeight='60px'" onblur="if(!this.value)this.style.minHeight='34px'"></textarea>
        <button class="ct-send" data-bid="${b.id}" onclick="submitComment(this.dataset.bid)">送信</button>
      </div>
      <div class="ct-list" id="cl-${b.id}">${renderCmtList(b.id)}</div>
    </div>`;
  });

  document.getElementById('content-inner').innerHTML=html;
  document.getElementById('main').scrollTop=0;

  setTimeout(()=>{
    const months=['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月'];
    const bOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9},boxWidth:12,padding:4}}},scales:{x:{ticks:{font:{size:8}},grid:{display:false}},y:{ticks:{font:{size:8}},beginAtZero:true}},animation:{duration:600}};

    const drawLine=(id,key,d1,d2,c1,c2)=>{
      const el=document.getElementById(id);
      if(el&&!chartRendered[key]){
        chartRendered[key]=true;
        new Chart(el,{type:'line',data:{labels:months,datasets:[
          {label:'TEMS社員',data:d1,borderColor:c1,backgroundColor:c1.replace(')','.1)').replace('rgb','rgba'),tension:.4,pointRadius:3,borderWidth:2},
          {label:'JRエルダー・OB',data:d2,borderColor:c2,backgroundColor:c2.replace(')','.1)').replace('rgb','rgba'),tension:.4,pointRadius:3,borderWidth:2}
        ]},options:bOpts});
      }
    };
    drawLine('chart-good','good',[24,28,32,36,30,34,38,42,36,30,28],[12,15,16,18,15,17,20,22,18,15,14],'rgb(30,58,110)','rgb(230,126,34)');
    drawLine('chart-bad','bad',[30,42,50,55,38,48,56,60,44,36,32],[10,11,12,11,10,12,11,12,10,11,10],'rgb(192,57,43)','rgb(149,165,166)');
    drawLine('chart-best','best',[28,34,38,42,32,36,40,44,36,30,28],[24,30,34,38,28,32,36,40,32,26,24],'rgb(30,58,110)','rgb(39,174,96)');

    const pieEl=document.getElementById(`pie-${visBlocks.find(b=>b.hasPieChart)?.id||'x'}`);
    if(pieEl&&!chartRendered['pie']){
      chartRendered['pie']=true;
      new Chart(pieEl,{type:'pie',data:{
        labels:['TEMS社員 68%','JRエルダー・OB 18%','出向AC 6%','JR一般出向 2%','JR管理 2%','その他 4%'],
        datasets:[{data:[68,18,6,2,2,4],backgroundColor:['#1e3a6e','#c0392b','#27ae60','#8e44ad','#e67e22','#95a5a6'],borderWidth:2,borderColor:'#fff'}]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label}}}}});
    }
  },150);
}

function getLikeCount(id){
  const base={b1_1_1:8,'b1-1-1':8,'b1-1-2':12,'b1-1-6':15,'b4-1-1':22,'b4-1-3':18,'b4-2-1':14};
  return (base[id]||3)+(likes[id]?1:0);
}
function renderCmtList(blockId){
  return comments.filter(c=>c.blockId===blockId).map(c=>`<div class="ct-item"><div class="ct-meta">${c.author} · ${c.time}</div><div class="ct-text">${c.text}</div></div>`).join('');
}

function toggleLike(id){
  likes[id]=!likes[id];
  const btn=document.querySelector(`#cb-${id} .ba-btn`);
  if(btn) btn.className='ba-btn'+(likes[id]?' liked':'');
  const lc=document.getElementById(`lc-${id}`);
  if(lc) lc.textContent=getLikeCount(id);
  showToast(likes[id]?'👍 いいねしました':'いいねを取り消しました');
  renderSide();
}
function toggleCmt(id){
  cmtOpen[id]=!cmtOpen[id];
  const el=document.getElementById(`ct-${id}`);
  if(el) el.className='ct'+(cmtOpen[id]?' open':'');
  if(cmtOpen[id]) setTimeout(()=>{ const ci=document.getElementById(`ci-${id}`); if(ci) ci.focus(); },50);
}
function submitComment(blockId){
  const ci=document.getElementById(`ci-${blockId}`);
  const text=ci?.value.trim();
  if(!text){ showToast('コメントを入力してください'); return; }
  const now=new Date();
  const time=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  comments.push({blockId,author:currentRole==='manager'?'田中 部長':'佐藤 太郎',time,text});
  if(ci) ci.value='';
  const cl=document.getElementById(`cl-${blockId}`);
  if(cl) cl.innerHTML=renderCmtList(blockId);
  const cc=document.getElementById(`cc-${blockId}`);
  if(cc) cc.textContent=comments.filter(c=>c.blockId===blockId).length+'件';
  showToast('✅ 意見を送信しました');
  renderSide();
}

function switchTab(tab){
  activeTab=tab;
  document.getElementById('tab-op').className='s-tab'+(tab==='op'?' active':'');
  document.getElementById('tab-lk').className='s-tab'+(tab==='lk'?' active':'');
  renderSide();
}
function findBlockLabel(blockId){
  let label='';
  CHAPTERS.forEach(ch=>ch.sections.forEach(s=>s.blocks.forEach(b=>{ if(b.id===blockId) label=s.title; })));
  return label;
}
function renderSide(){
  const el=document.getElementById('side-body');
  if(activeTab==='op'){
    if(!comments.length){ el.innerHTML='<div class="empty">まだ意見はありません。<br>各段落の💬から投稿できます。</div>'; return; }
    el.innerHTML=comments.slice().reverse().map(c=>`<div class="op-item"><div class="op-sec">${findBlockLabel(c.blockId)}</div><div class="op-text">${c.text}</div><div class="op-meta"><span>${c.author}</span><span>${c.time}</span></div></div>`).join('');
  } else {
    const allBlocks=CHAPTERS.flatMap(ch=>ch.sections.flatMap(s=>s.blocks));
    const sorted=allBlocks.map(b=>({b,count:getLikeCount(b.id)})).sort((a,b)=>b.count-a.count).slice(0,10);
    const max=sorted[0]?.count||1;
    el.innerHTML=sorted.map(({b,count})=>`<div class="lk-item"><div class="lk-num">${count}</div><div class="lk-info"><div class="lk-sec">${findBlockLabel(b.id)}</div><div class="lk-title">${(b.label||b.text||'').substring(0,20)}...</div><div class="lk-bar"><div class="lk-bar-fill" style="width:${Math.round(count/max*100)}%"></div></div></div></div>`).join('');
  }
}

document.getElementById('search-inp').addEventListener('input',function(){
  const v=this.value.trim();
  if(!v){ hideSP(); return; }
  document.getElementById('sp').className='show';
  const results=[];
  CHAPTERS.forEach(ch=>ch.sections.forEach(s=>s.blocks.forEach(b=>{
    const txt=(b.text||'')+(b.label||'')+(b.items||[]).join('');
    if(txt.includes(v)){
      const idx=txt.indexOf(v);
      const snip=txt.substring(Math.max(0,idx-25),idx+65).replace(new RegExp(v.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),`<mark>${v}</mark>`);
      results.push({s,b,snip});
    }
  })));
  document.getElementById('sr-title').textContent=`検索結果「${v}」— ${results.length}件`;
  document.getElementById('sr-list').innerHTML=results.length
    ? results.map(r=>`<div class="sr-item" data-sid="${r.s.id}" data-q="${v}" onclick="showSection(this.dataset.sid)"><div class="si-ch">${r.s.title}</div><div class="si-title">${r.b.label||r.s.title}</div><div class="si-snip">...${r.snip}...</div></div>`).join('')
    : '<div style="text-align:center;padding:24px;color:var(--muted);font-size:12px">該当するページが見つかりませんでした</div>';
});
function hideSP(){ document.getElementById('sp').className=''; }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show';
  setTimeout(()=>t.className='',2200);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') hideSP(); });
</script>
